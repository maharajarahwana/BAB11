  <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bab11</title>

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:15px;
}

.card{
  background:white;
  width:100%;
  max-width:500px;
  margin:auto;
  padding:25px 20px;
  text-align:center;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#question{
  font-size:42px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:10px;
  border:2px solid orange;
  border-radius:6px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  font-size:16px;
  margin-top:15px;
  cursor:pointer;
  background:#007BFF;
  color:white;
  border:none;
  border-radius:6px;
}

.result{
  font-size:20px;
  font-weight:bold;
}

.correct{
  color:green;
}

.wrong{
  color:red;
}

/* Perbaikan agar nomor tidak terpotong */

ol{
  text-align:left;
  max-height:65vh;
  overflow-y:auto;
  padding-left:30px;
  margin:0;
}

li{
  margin-bottom:8px;
  line-height:1.4;
}

</style>
</head>

<body>

<div class="card">

<h2 id="question"></h2>

<input type="text" id="answerInput" placeholder="Tulis jawaban di sini">

<button id="nextBtn">Selanjutnya</button>

</div>

<script>

let questions = [

{ soal: "집안일", jawaban: "pekerjaan rumah tangga" },

{ soal: "메뉴", jawaban: "menu" },
{ soal: "버리다", jawaban: "membuang" },
{ soal: "냉장고", jawaban: "kulkas" },
{ soal: "쓰레기", jawaban: "sampah" },
{ soal: "책상", jawaban: "meja belajar" },
{ soal: "일반 쓰레기", jawaban: "sampah biasa" },
{ soal: "바닥", jawaban: "lantai" },
{ soal: "음식물 쓰레기", jawaban: "sampah makanan" },
{ soal: "침대", jawaban: "tempat tidur" },
{ soal: "재활 용품", jawaban: "daur ulang" },
{ soal: "창문", jawaban: "jendela" },
{ soal: "헌옷", jawaban: "baju bekas" },
{ soal: "갑자기", jawaban: "tiba-tiba" },
{ soal: "쓰레기 봉투", jawaban: "kantong sampah" },
{ soal: "의류", jawaban: "pakaian" },
{ soal: "수거함", jawaban: "tempat sampah daur ulang" },
{ soal: "왜", jawaban: "mengapa" },
{ soal: "세탁기를 돌리다", jawaban: "menyalakan mesin cuci" },
{ soal: "폐기물", jawaban: "limbah / sampah" },
{ soal: "빨래를 널다", jawaban: "menjemur pakaian" },
{ soal: "도와주다", jawaban: "membantu" },
{ soal: "빨래를 걷다", jawaban: "mengangkat pakaian" },
{ soal: "스티커", jawaban: "sticker" },
{ soal: "옷을 다리다", jawaban: "menyetrika baju" },
{ soal: "그러면", jawaban: "kalau begitu" },
{ soal: "옷을 개다", jawaban: "melipat baju" },
{ soal: "비용", jawaban: "biaya" },
{ soal: "먼지를 털다", jawaban: "mengelap debu" },
{ soal: "천천히", jawaban: "pelan-pelan" },
{ soal: "정리하다", jawaban: "merapikan" },
{ soal: "대형 쓰레기", jawaban: "sampah ukuran besar" },
{ soal: "빗자루", jawaban: "sapu" },
{ soal: "종량제", jawaban: "pembayaran berdasarkan volume sampah" },
{ soal: "쓸다", jawaban: "menyapu" },
{ soal: "수퍼마켓", jawaban: "supermarket" },
{ soal: "청소기를 돌리다", jawaban: "menyalakan vacuum cleaner" },
{ soal: "최대한", jawaban: "sebisa mungkin" },
{ soal: "닦다", jawaban: "mengelap" },
{ soal: "제거한", jawaban: "dibuang" },
{ soal: "밥을 하다 / 짓다", jawaban: "memasak nasi" },
{ soal: "닭뼈", jawaban: "tulang ayam" },
{ soal: "음식을 만들다", jawaban: "membuat makanan" },
{ soal: "수거통", jawaban: "tempat sampah" },
{ soal: "담요", jawaban: "selimut" },
{ soal: "설거지를 하다", jawaban: "mencuci piring" },
{ soal: "밥솥", jawaban: "rice cooker" },
{ soal: "냄비", jawaban: "panci" },
{ soal: "프라이팬", jawaban: "wajan" },
{ soal: "행정복지센터", jawaban: "pusat administrasi dan kesejahteraan" },
{ soal: "달걀 껍데기", jawaban: "cangkang telur" },
{ soal: "동물", jawaban: "hewan" },

];

questions = questions.sort(()=>Math.random()-0.5);

let index = 0;
let score = 0;
let userAnswers = [];

const questionEl = document.getElementById("question");
const answerInput = document.getElementById("answerInput");
const nextBtn = document.getElementById("nextBtn");
const card = document.querySelector(".card");

function showQuestion(){
  questionEl.textContent = questions[index].soal;
  answerInput.value="";
  answerInput.focus();
}

nextBtn.addEventListener("click",()=>{

  const userAnswer = answerInput.value.trim().toLowerCase();

  userAnswers[index] = userAnswer;

  if(userAnswer === questions[index].jawaban){
    score++;
  }

  index++;

  if(index < questions.length){
    showQuestion();
  }else{
    showResult();
  }

});

function showResult(){

  let answerList="";

  questions.forEach((q,i)=>{

    if(userAnswers[i] === q.jawaban){
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span></li>`;
    }else{
      answerList += `<li>${q.soal} = <span class="correct">${q.jawaban}</span><br>
      Jawaban kamu: <span class="wrong">${userAnswers[i] || "(kosong)"}</span></li>`;
    }

  });

  card.innerHTML = `
  <hr>
  <p>Kunci Jawaban:</p>
  <ol>${answerList}</ol>
  `;

}

showQuestion();

</script>

</body>
</html>
